<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Redirect to index.html with the path for client-side routing
    const path = window.location.pathname
    window.location.replace('/index.html' + (path === '/' ? '' : '?route=' + path))
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
